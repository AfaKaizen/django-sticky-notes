{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body text-center">
                <!-- Delete confirmation heading -->
                <h4 class="text-danger">Note Delete Karein?</h4>
                
                <!-- Confirmation message -->
                <p>Are You Sure? <strong>"{{ note.title }}"</strong>Delete note?</p>
                <p class="text-muted">This action is not reversible.</p>
                
                <!-- Delete form -->
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, delete.</button>
                </form>
                
                <!-- Cancel button -->
                <a href="{% url 'note_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
